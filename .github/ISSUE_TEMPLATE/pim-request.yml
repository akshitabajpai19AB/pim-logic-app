name: PIM Access Request
description: Request temporary PIM group activation through approval workflow
title: "[PIM Request] "

body:

  - type: input
    id: user_name
    attributes:
      label: User Name
      description: Exact display name in Entra ID
    validations:
      required: true

  - type: input
    id: user_email
    attributes:
      label: User Email
      description: Email address of the user requesting PIM access
    validations:
      required: true

  - type: input
    id: group_name
    attributes:
      label: PIM Group Name
      description: Name of the PIM-enabled group to activate
      placeholder: PIM-Contributor-Group
    validations:
      required: true

  - type: input
    id: duration
    attributes:
      label: Duration (hours)
      description: Number of hours for which access should be activated
      placeholder: "4"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Future Activation (Optional)

        Future activation can be scheduled for a specific date and time.

  - type: checkboxes
    id: is_future_activation
    attributes:
      label: Is this a future activation request?
      options:
        - label: Yes, schedule activation for a future date and time

  - type: input
    id: future_activation_date
    attributes:
      label: Future Activation Date
      description: Format YYYY-MM-DD
      placeholder: "2026-07-15"

  - type: input
    id: future_activation_time
    attributes:
      label: Future Activation Time (24-hour format)
      description: Format HH:mm
      placeholder: "18:30"

  - type: textarea
    id: justification
    attributes:
      label: Justification
      description: Provide the business justification for this access request
    validations:
      required: true
