name: Send PIM Request to Logic App

on:
  issues:
    types:
      - opened
      - edited
      - reopened

jobs:
  send-request:
    runs-on: ubuntu-latest

    steps:
      - name: Extract Fields
        run: |
          BODY="${{ github.event.issue.body }}"

          USER_NAME=$(echo "$BODY" | awk '/### User Name/{getline; getline; print}')
          USER_EMAIL=$(echo "$BODY" | awk '/### User Email/{getline; getline; print}')
          GROUP_NAME=$(echo "$BODY" | awk '/### PIM Group Name/{getline; getline; print}')
          DURATION=$(echo "$BODY" | awk '/### Duration/{getline; getline; print}')
          JUSTIFICATION=$(echo "$BODY" | awk '/### Justification/{getline; getline; print}')

          echo "USER_NAME=$USER_NAME" >> $GITHUB_ENV
          echo "USER_EMAIL=$USER_EMAIL" >> $GITHUB_ENV
          echo "GROUP_NAME=$GROUP_NAME" >> $GITHUB_ENV
          echo "DURATION=$DURATION" >> $GITHUB_ENV
          echo "JUSTIFICATION=$JUSTIFICATION" >> $GITHUB_ENV

          echo "Extracted User: $USER_EMAIL"
          echo "Extracted User: $USER_NAME"
          echo "Extracted Group: $GROUP_NAME"

      - name: Verify Values
        run: |
          echo "User=$USER_EMAIL"
          echo "Group=$GROUP_NAME"
          echo "Duration=$DURATION"
          echo "Justification=$JUSTIFICATION"

      - name: Call Logic App
        run: |
          curl -X POST "${{ secrets.LOGIC_APP_URL }}" \
          -H "Content-Type: application/json" \
          -d '{
            "issueNumber":"${{ github.event.issue.number }}",
            "repository":"${{ github.repository }}",
            "userName":"${{ env.USER_NAME }}",
            "userEmail":"${{ env.USER_EMAIL }}",
            "groupName":"${{ env.GROUP_NAME }}",
            "duration":"${{ env.DURATION }}",
            "justification":"${{ env.JUSTIFICATION }}"
          }'
